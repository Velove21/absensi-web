name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Jalankan otomatis setiap kamu push ke branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # Build and push using the optimized multi-stage Dockerfile
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # (Optional) Trigger Coolify redeployment automatically after image push
      # To use this, add COOLIFY_WEBHOOK_URL to your GitHub repository secrets
      # - name: Trigger Coolify Redeployment
      #   run: |
      #     curl -i -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"